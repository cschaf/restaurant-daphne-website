name: Deploy to Strato

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete nested .git directories
        run: find . -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true

      - name: Deploy to Strato via SFTP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.STRATO_HOST }}
          username: ${{ secrets.STRATO_USERNAME }}
          password: ${{ secrets.STRATO_PASSWORD }}
          port: 22
          source: "./"
          target: "/"
          strip_components: 0
          overwrite: true
          softlink: false
